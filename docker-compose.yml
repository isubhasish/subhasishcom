version: '3.8'

services:
  bot:
    build: .
    container_name: subhasish_compressor
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      # Full directory mount for session persistence and live code updates
      - .:/app
    environment:
      PYTHONUNBUFFERED: '1'
      TZ: 'Asia/Kolkata'